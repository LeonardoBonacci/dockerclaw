services:
  coordinator:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: swarm-coordinator
    restart: unless-stopped
    ports:
      - "18800:18789"
    volumes:
      - ./coordinator/data:/home/node/.openclaw
      - ./coordinator/workspace:/home/node/workspace
      - ./shared:/home/node/workspace/shared
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OPENCLAW_GATEWAY_MODE=local
      - OPENCLAW_GATEWAY_PASSWORD=openclaw
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["node", "openclaw.mjs", "gateway", "--allow-unconfigured"]

  writer:
